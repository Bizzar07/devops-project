name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/app && cd ~/app
            # Ștergem ce e vechi pentru o instalare curată
            sudo rm -rf *
            # Clonăm repo-ul tău (înlocuiește Bizzar07/devops-project cu numele tău real dacă e diferit)
            git clone https://github.com/Bizzar07/devops-project.git .
            # Oprim containerul vechi dacă există
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            # Construim imaginea folosind fișierul dockerfile (am pus -f pentru a fi siguri)
            sudo docker build -t my-app -f dockerfile .
            # Pornim aplicația pe portul 80
            sudo docker run -d --name my-app -p 80:3000 my-app
