name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
         script: |
            # Ne asigurăm că folderul există
            mkdir -p ~/app && cd ~/app
            
            # Curățăm folderul înainte de clone pentru a evita eroarea "already exists"
            sudo rm -rf * .git .github
            
            # Clonăm din nou curat
            git clone https://github.com/${{ github.repository }}.git .
            
            # Oprim containerele vechi (ignora erorile dacă nu există)
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            
            # Construim imaginea folosind numele corect: Dockerfile
            sudo docker build -t my-app -f Dockerfile .
            
            # Pornim aplicația
            sudo docker run -d --name my-app -p 80:3000 my-app
          
