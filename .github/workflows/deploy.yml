name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Mergem în home
            cd ~
            # Ștergem folderul app cu forța, indiferent ce e în el
            sudo rm -rf ~/app
            # Îl creăm de la zero
            mkdir -p ~/app && cd ~/app
            
            # Acum clonăm - nu are cum să mai dea eroare de "already exists"
            git clone https://github.com/${{ github.repository }}.git .
            
            # Oprim resturile vechi
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            
            # Build & Run folosind Dockerfile (cu D mare)
            sudo docker build -t my-app .
            sudo docker run -d --name my-app -p 80:3000 my-app
