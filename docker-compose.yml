version: '3.8'

services:
  app:
    build: .
    restart: always
    ports:
      - "80:3000"
    networks:
      - monitoring
    logging:
      driver: "loki"
      options:
        # Folosim localhost pentru că plugin-ul Docker de pe host trimite datele
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"

  prometheus:
    image: prom/prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3001:3000"
    networks:
      - monitoring

  loki:
    image: grafana/loki:latest
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge